- type: entity
  name: salmon sushi roll
  parent: FoodMealBase
  id: FoodMealSalmonSushi
  description: Where did the seaweed come from?
  components:
  - type: FlavorProfile
    flavors:
    - fishy
    - cucumber
    - avocado
  - type: Sprite
    sprite: _Floof/Objects/Consumable/Food/fish_filet.rsi
    state: salmon_sushi_roll
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 40
        reagents:
        - ReagentId: Nutriment
          Quantity: 20
        - ReagentId: Flavorol
          Quantity: 10
        - ReagentId: CucumberWater
          Quantity: 2
  - type: SliceableFood
    count: 5
    slice: FoodMealSalmonSushiSlice

- type: entity
  name: salmon sushi roll slice
  parent: FoodInjectableBase
  id: FoodMealSalmonSushiSlice
  description: Where did the seaweed come from?
  components:
  - type: FlavorProfile
    flavors:
    - fishy
    - cucumber
    - avocado
  - type: Sprite
    sprite: _Floof/Objects/Consumable/Food/fish_filet.rsi
    state: salmon_suhsi_slice
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 8
        reagents:
        - ReagentId: Nutriment
          Quantity: 4
        - ReagentId: Flavorol
          Quantity: 2
        - ReagentId: CucumberWater
          Quantity: .4

- type: entity
  parent: FoodBurgerBase
  id: FoodBurgerLowQualityFish
  name: fish burger
  description: Almost like a fish is yelling somewhere...
  components:
  - type: Sprite
    sprite: _Floof/Objects/Consumable/Food/fish_filet.rsi
    state: kortaburger
  - type: Item
    storedOffset: 0,1
    inhandVisuals:
      left:
      - state: bun-inhand-left
      - state: alpha-filling-inhand-left
        color: "#feffba"
      - state: alpha-patty-inhand-left
        color: "#f4bb53"
      right:
      - state: bun-inhand-right
      - state: alpha-filling-inhand-right
        color: "#feffba"
      - state: alpha-patty-inhand-right
        color: "#f4bb53"
  - type: FlavorProfile
    flavors:
    - bun
    - fishy
  - type: Tag
    tags:
    - Meat

