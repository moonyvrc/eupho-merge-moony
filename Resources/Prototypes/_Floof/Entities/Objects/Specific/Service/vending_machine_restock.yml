- type: entity
  parent: BaseVendingMachineRestock
  id: VendingMachineRestockPetStore
  name: Pet Store Restock
  description: Get all the supplies you need at your local Pet Shop!
  components:
  - type: VendingMachineRestock
    canRestock:
    - PetVendorInventory
  - type: Sprite
    layers:
    - state: base
    - state: green_bit
      shader: unshaded
    - state: refill_games

- type: entity
  parent: BaseVendingMachineRestock
  id: VendingMachineRestockBepis
  name: bepis restock box
  description: A cold, clunky container of colliding chilly cylinders. Use only for Bepis brand vending machines.
  components:
  - type: VendingMachineRestock
    canRestock:
    - BepisInventory
  - type: Sprite
    layers:
    - state: base
    - state: green_bit
      shader: unshaded
    - state: refill_cola
